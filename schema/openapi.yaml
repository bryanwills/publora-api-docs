        "401":
          description: Invalid API key or expired LinkedIn token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                tokenExpired:
                  value: { "error": "LINKEDIN_TOKEN_EXPIRED" }
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /list-posts:
    get:
      summary: List posts with pagination and filters
      description: |
        Retrieve a paginated list of all your scheduled, draft, published, and failed posts.

        **Pagination behavior:** The `page` and `limit` parameters are silently clamped to valid ranges
        rather than returning errors. `page` is clamped to a minimum of 1, and `limit` is clamped to 1-100.

        **Platform filtering:** The `platform` filter uses case-insensitive prefix matching.
      operationId: listPosts
      tags:
        - Posts
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: "Page number (1-indexed). Values < 1 are silently clamped to 1."
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: "Items per page. Values are silently clamped to range 1-100."
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          required: false
          description: Filter by post status
          schema:
            type: string
            enum: [draft, scheduled, published, failed, partially_published]
        - name: platform
          in: query
          required: false
          description: "Filter by platform (case-insensitive prefix matching)"
          schema:
            type: string
            enum: [twitter, linkedin, instagram, threads, tiktok, youtube, facebook, bluesky, mastodon, telegram]
        - name: sortBy
          in: query
          required: false
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, updatedAt, scheduledTime]
            default: createdAt
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: fromDate
          in: query
          required: false
          description: Filter posts scheduled after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          required: false
          description: Filter posts scheduled before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        postGroupId:
                          type: string
                          example: "507f1f77bcf86cd799439011"
                        content:
                          type: string
                          example: "Excited to share our new product launch!"
                        status:
                          type: string
                          enum: [draft, scheduled, published, failed, partially_published]
                        scheduledTime:
                          type: string
                          format: date-time
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                        platforms:
                          type: array
                          items:
                            type: object
                            properties:
                              platformId:
                                type: string
                              platform:
                                type: string
                              status:
                                type: string
                        mediaUrls:
                          type: array
                          items:
                            type: string
                            format: uri
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      totalItems:
                        type: integer
                        example: 47
                      totalPages:
                        type: integer
                        example: 3
                      hasNextPage:
                        type: boolean
                        example: true
                      hasPrevPage:
                        type: boolean
                        example: false
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidStatus:
                  value: { "error": "Invalid status. Must be one of: draft, scheduled, published, failed, partially_published" }
                invalidSortBy:
                  value: { "error": "Invalid sortBy. Must be one of: createdAt, updatedAt, scheduledTime" }
                invalidFromDate:
                  value: { "error": "Invalid fromDate format" }
                invalidToDate:
                  value: { "error": "Invalid toDate format" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /test-connection/{platformId}:
    post:
      summary: Test platform connection health
      description: |
        Validate that a platform connection is working correctly.
        Returns token status, permissions, and last error if any.
      operationId: testConnection
      tags:
        - Connections
      parameters:
        - name: platformId
          in: path
          required: true
          description: "Platform connection ID (format: platform-id)"
          schema:
            type: string
          example: "linkedin-Tz9W5i6ZYG"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform:
                    type: string
                    example: "linkedin"
                  platformId:
                    type: string
                    example: "linkedin-Tz9W5i6ZYG"
                  username:
                    type: string
                    example: "John Doe"
                  status:
                    type: string
                    enum: [ok, error]
                    example: "ok"
                  message:
                    type: string
                    example: "Connection is valid"
                  permissions:
                    type: array
                    items:
                      type: string
                    example: ["w_member_social", "r_basicprofile"]
                  tokenExpiresIn:
                    type: string
                    nullable: true
                    example: "29 days"
                  lastSuccessfulPost:
                    type: string
                    format: date-time
                    nullable: true
                  lastError:
                    type: string
                    nullable: true
        "400":
          description: Invalid platformId format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /post-logs/{postGroupId}:
    get:
      summary: Get post publishing logs
      description: |
        Retrieve detailed logs for a post group showing the publishing process,
        including scheduling, processing, success, and failure events.
      operationId: getPostLogs
      tags:
        - Logs
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Post logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/PostLog"
        "404":
          description: Post group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks:
    get:
      summary: List all webhooks
      description: Retrieve all webhooks configured for your account.
      operationId: listWebhooks
      tags:
        - Webhooks
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a webhook
      description: |
        Create a new webhook endpoint. Maximum 10 webhooks per user.
        The webhook secret is only returned on creation - save it securely.
      operationId: createWebhook
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url, events]
              properties:
                name:
                  type: string
                  description: "Friendly name for the webhook"
                  example: "Production webhook"
                url:
                  type: string
                  format: uri
                  description: "HTTPS URL to receive webhook events"
                  example: "https://example.com/webhooks/publora"
                events:
                  type: array
                  items:
                    type: string
                    enum: [post.scheduled, post.published, post.failed, token.expiring]
                  description: "Events to subscribe to"
                  example: ["post.published", "post.failed"]
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  webhook:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      url:
                        type: string
                      events:
                        type: array
                        items:
                          type: string
                      secret:
                        type: string
                        description: "Webhook secret for signature verification (only returned on create)"
                      isActive:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "Name, URL, and at least one event are required" }
                invalidUrl:
                  value: { "error": "URL must use HTTPS" }
                invalidEvents:
                  value: { "error": "Invalid events: xyz" }
                limitReached:
                  value: { "error": "Maximum of 10 webhooks per user" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/{id}:
    patch:
      summary: Update a webhook
      description: Update an existing webhook's name, URL, events, or active status.
      operationId: updateWebhook
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum: [post.scheduled, post.published, post.failed, token.expiring]
                isActive:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  webhook:
                    $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a webhook
      description: Delete a webhook endpoint.
      operationId: deleteWebhook
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/{id}/regenerate-secret:
    post:
      summary: Regenerate webhook secret
      description: |
        Generate a new secret for a webhook. The old secret will be invalidated.
        Make sure to update your webhook handler with the new secret.
      operationId: regenerateWebhookSecret
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  secret:
                    type: string
                    description: "New webhook secret"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /linkedin-comments:
    post:
      summary: Add a comment to a LinkedIn post
      description: |
        Post a comment on a LinkedIn post. Supports replies to existing comments
        via the parentComment parameter. Maximum comment length is 1250 characters.
        Supports @mentions using @{urn:li:person:ID|Name} or @{urn:li:organization:ID|Company} syntax.
      operationId: createLinkedInComment
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postedId, message, platformId]
              properties:
                postedId:
                  type: string
                  description: "LinkedIn post URN (urn:li:share:*, urn:li:ugcPost:*, urn:li:activity:*)"
                  example: "urn:li:share:7123456789012345678"
                message:
                  type: string
                  description: "Comment text (max 1250 characters). Supports mentions: @{urn:li:person:ID|Name} or @{urn:li:organization:ID|Company}"
                  example: "Great insights @{urn:li:person:ACoAABcD1234EfG|Jane Smith}! Thanks for sharing."
                platformId:
                  type: string
                  description: "LinkedIn connection ID"
                  example: "linkedin-Tz9W5i6ZYG"
                parentComment:
                  type: string
                  description: "Optional parent comment URN for replies"
                  example: "urn:li:comment:(urn:li:activity:123,456)"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  comment:
                    type: object
                    properties:
                      id:
                        type: string
                        description: "Comment URN"
                      message:
                        type: string
                      actor:
                        type: string
                      object:
                        type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "postedId, message, and platformId are required" }
                invalidUrn:
                  value: { "error": "postedId must be a valid LinkedIn URN" }
                emptyMessage:
                  value: { "error": "message cannot be empty" }
                messageTooLong:
                  value: { "error": "message cannot exceed 1250 characters" }
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a comment from a LinkedIn post
      description: |
        Remove a comment from a LinkedIn post.
        Parameters can be provided as query parameters or in the request body.
      operationId: deleteLinkedInComment
      tags:
        - LinkedIn Analytics
      parameters:
        - name: postedId
          in: query
          description: "LinkedIn post URN (can also be provided in request body)"
          schema:
            type: string
          example: "urn:li:share:7123456789012345678"
        - name: commentId
          in: query
          description: "Comment ID or URN (can also be provided in request body)"
          schema:
            type: string
          example: "6636062862760562688"
        - name: platformId
          in: query
          description: "LinkedIn connection ID (can also be provided in request body)"
          schema:
            type: string
          example: "linkedin-Tz9W5i6ZYG"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                postedId:
                  type: string
                commentId:
                  type: string
                platformId:
                  type: string
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted:
                    type: string
                    description: "Comment ID that was deleted"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "postedId, commentId, and platformId are required" }
                invalidUrn:
                  value: { "error": "postedId must be a valid LinkedIn URN" }
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================================
  # WORKSPACE API
  # To enable Workspace access, please contact Publora support at serge@publora.com
  # ============================================================================

  /workspace/users:
    get:
      summary: List managed users
      description: |
        Retrieve all users managed under your workspace.

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: getManagedUsers
      tags:
        - Workspace
      responses:
        "200":
          description: List of managed users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/ManagedUser"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Workspace access is not enabled for this key"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a managed user
      description: |
        Create a new managed user under your workspace.
        The user can then connect their social accounts via a connection URL.

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: createManagedUser
      tags:
        - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  format: email
                  description: "User's email address (must be unique)"
                  example: "user@example.com"
                displayName:
                  type: string
                  description: "Display name (defaults to email if not provided)"
                  example: "John Doe"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/ManagedUser"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email is required"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            An account with this email already exists. The response includes
            `userId` and membership fields (`attachable`, `requiresConsent`,
            `reason`, `alreadyInWorkspace`, `managedByAnotherWorkspace`). When
            `attachable: true`, attach the user via POST /workspace/users/attach.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User with this email already exists"
                code: "email_exists"
                userId: "6626a1f5e4b0c91a2d3f4567"
                alreadyInWorkspace: false
                managedByAnotherWorkspace: false
                reason: "standalone_user_exists"
                attachable: true
                requiresConsent: true
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/attach:
    post:
      summary: Attach an existing user
      description: |
        Attach an existing standalone Publora user to your workspace as a managed
        user. Because the target account already exists, this requires the target
        user's consent: a valid access token belonging to that user (the
        `accessToken` returned when they sign in), passed as `userAccessToken`.
        Re-attaching a user who is already in your workspace is idempotent and
        does not require a consent token.

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: attachManagedUser
      tags:
        - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: "The existing user's email. Provide either email or userId (also accepted as `username`)."
                  example: "user@example.com"
                userId:
                  type: string
                  description: "The existing user's ObjectId. Provide either email or userId."
                  example: "6626a1f5e4b0c91a2d3f4567"
                userAccessToken:
                  type: string
                  description: "The target user's access token, proving consent. Required unless the user is already in your workspace. Also accepted as `attachToken` in the body or via the `x-publora-user-token` header."
              example:
                email: "user@example.com"
                userAccessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: User attached (or already in your workspace)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/ManagedUser"
                  alreadyInWorkspace:
                    type: boolean
                    description: "true if the user was already managed by your workspace (idempotent re-attach)"
                    example: false
        "400":
          description: Missing/invalid identifier, mismatched email vs userId, or the owner's own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email or userId is required"
                code: "missing_identifier"
        "403":
          description: Workspace access not enabled, the target user's consent token is missing/invalid/mismatched, or attaching would exceed the plan's connection limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Target user consent token is required"
                code: "attach_consent_required"
        "404":
          description: No active user matches the identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User not found"
                code: "user_not_found"
        "409":
          description: The target user is inactive, a workspace owner, in another workspace, or has an active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Cannot attach a user with an active subscription"
                code: "user_has_active_subscription"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}:
    delete:
      summary: Detach a managed user
      description: |
        Remove a user from your workspace. The user account is not deleted,
        but is no longer managed by your workspace.

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: detachManagedUser
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: User detached
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}/api-key:
    post:
      summary: Generate API key for managed user
      description: |
        Generate a new API key for a managed user. This key can be used
        to make API calls on behalf of the managed user (e.g., create posts
        to their connected social accounts).

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: generateManagedUserApiKey
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API key generated successfully"
                  apiKey:
                    type: string
                    description: "The generated API key (save it securely - shown only once)"
                    example: "sk_lx5abc.a1b2c3d4e5f6..."
                  userId:
                    type: string
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace or API access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noWorkspace:
                  value: { "error": "Workspace access is not enabled for this key" }
                noApiAccess:
                  value: { "error": "API access is not enabled for this workspace owner" }
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workspace/users/{userId}/connection-url:
    post:
      summary: Get connection URL for managed user
      description: |
        Get or generate a URL that allows a managed user to connect their
        social media accounts. The URL expires after a configurable period
        (default: 7 days).

        **Requires Workspace access - contact serge@publora.com to enable.**
      operationId: getConnectionUrl
      tags:
        - Workspace
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rotate:
                  type: boolean
                  description: "Force generation of a new token even if current is valid"
                  default: false
                expiresInDays:
                  type: integer
                  description: "Number of days until the token expires"
                  default: 7
                  example: 30
      responses:
        "200":
          description: Connection URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: "URL for user to connect their social accounts"
                    example: "https://app.publora.com/connect/abc123..."
                  tokenExpiresAt:
                    type: string
                    format: date-time
                    description: "When the connection URL expires"
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Workspace access not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found or not managed by this key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
