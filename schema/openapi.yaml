          description: Reshare created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  reshare:
                    type: object
                    description: "LinkedIn API response for the created reshare"
                    properties:
                      id:
                        type: string
                        description: "URN of the new reshare post"
                        example: "urn:li:share:7123456789012345678"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "platformId and parent are required" }
                invalidParent:
                  value: { "error": "parent must be a valid LinkedIn post URN (urn:li:share:<id> or urn:li:ugcPost:<id>)" }
                commentaryTooLong:
                  value: { "error": "commentary cannot exceed 3000 characters" }
                invalidVisibility:
                  value: { "error": "visibility must be one of: PUBLIC, CONNECTIONS" }
