openapi: 3.0.3
info:
  title: Publora API
  description: |
    Affordable REST API for scheduling and publishing social media posts
    across X/Twitter, LinkedIn, Instagram, Threads, TikTok, YouTube,
    Facebook, Bluesky, Mastodon, and Telegram.

    All plans include full API access. Starting at $5.40/month (yearly) or $9/month.
    14-day free trial, no credit card needed.

    ## Workspace API
    The Workspace API allows you to manage multiple users under a single account.
    **To enable Workspace access, please contact Publora support at serge@publora.com.**
  version: "1.0.0"
  contact:
    email: serge@publora.com
    url: https://publora.com
servers:
  - url: https://api.publora.com/api/v1
    description: Production
security:
  - ApiKeyAuth: []

tags:
  - name: Posts
    description: Create, update, delete, and list posts
  - name: Connections
    description: Manage platform connections
  - name: Media
    description: Upload media files
  - name: LinkedIn Analytics
    description: LinkedIn-specific analytics and interactions
  - name: Webhooks
    description: Manage webhook endpoints for real-time notifications
  - name: Workspace
    description: "Manage multiple users (requires Workspace access - contact support)"
  - name: Logs
    description: Post logs and debugging

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-publora-key
      description: "API key from Settings > API Keys. Format: sk_timestamp.hexstring"

  schemas:
    YouTubePlaylistReference:
      type: object
      description: "Reference to a YouTube playlist for platformSettings.youtube.playlist. Send empty strings for both fields to clear the playlist."
      properties:
        id:
          type: string
          description: "YouTube playlist id"
          example: "PLxxxxxxxx"
        platformId:
          type: string
          description: "Compound YouTube platform id from platforms; must match the single selected YouTube channel"
          example: "youtube-UCxxxxxxxx"
    YouTubeThumbnailReference:
      type: object
      description: "Reference to a Publora-tracked custom thumbnail for platformSettings.youtube.thumbnail. Send an empty url to clear the thumbnail. Set via update-post only (the upload requires a postGroupId)."
      properties:
        mediaId:
          type: string
          description: "Publora media id returned by the YouTube thumbnail upload endpoint"
          example: "665f..."
        url:
          type: string
          description: "Publora-hosted thumbnail URL returned by the upload endpoint"
          example: "https://media.publora.com/..."
    PlatformSettingsInput:
      type: object
      description: "Per-platform settings. Only tiktok, instagram, youtube, threads, and telegram keys are recognized; other platform keys are silently dropped. Merged with defaults on create-post and with existing settings on update-post (omitted fields are preserved)."
      properties:
        instagram:
          type: object
          properties:
            videoType:
              type: string
              enum: [REELS, STORIES]
              default: REELS
              description: "How videos are published"
            coverUrl:
              type: string
              description: "Custom Reels cover image (alias: cover_url). Publicly accessible http(s) URL to a JPEG — Instagram fetches it server-side at publish time. Empty string clears the custom cover. Invalid URLs are rejected with 400. Ignored for Stories and image posts."
              example: "https://cdn.example.com/covers/reel-cover.jpg"
        tiktok:
          type: object
          description: "TikTok settings (viewerSetting, allowComments, allowDuet, allowStitch, commercialContent, brandOrganic, brandedContent)"
        youtube:
          type: object
          description: "YouTube settings (privacy, title, tags, categoryId, madeForKids, playlist; thumbnail is settable via update-post only)"
        threads:
          type: object
          description: "Threads settings (replyControl)"
        telegram:
          type: object
          description: "Telegram settings (disableNotification, disableWebPagePreview, protectContent — booleans)"
    PlatformConnection:
      type: object
      properties:
        platformId:
          type: string
          description: "Unique ID in format platform-id (e.g., twitter-123456789)"
          example: "twitter-123456789"
        username:
          type: string
          example: "@yourhandle"
        displayName:
          type: string
          example: "Your Name"
        profileImageUrl:
          type: string
          format: uri
          example: "https://pbs.twimg.com/profile_images/..."
        profileUrl:
          type: string
          format: uri
          nullable: true
          description: "URL to the user's profile on the platform. Can be null if not available for the platform."
          example: "https://twitter.com/yourhandle"
        accessTokenExpiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-15T10:30:00.000Z"
        tokenStatus:
          type: string
          enum: [valid, expiring_soon, expired, unknown]
          description: "Current status of the access token"
          example: "valid"
        tokenExpiresIn:
          type: string
          nullable: true
          description: "Human-readable time until token expiration"
          example: "29 days"
        lastSuccessfulPost:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of last successful post"
        lastError:
          type: string
          nullable: true
          description: "Last error message if any"

    ManagedUser:
      type: object
      properties:
        _id:
          type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          description: "User email"
          example: "user@example.com"
        displayName:
          type: string
          example: "John Doe"
        role:
          type: string
          enum: [managed]
          example: "managed"
        dailyPostsLeft:
          type: integer
          example: 100
        connectionsPageUrl:
          type: string
          format: uri
          nullable: true
          description: "URL for user to connect their social accounts"
        connectionsPageTokenExpiresAt:
          type: string
          format: date-time
          nullable: true

    Webhook:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: "My Webhook"
        url:
          type: string
          format: uri
          example: "https://example.com/webhook"
        events:
          type: array
          items:
            type: string
            enum: [post.scheduled, post.published, post.failed, token.expiring]
          example: ["post.published", "post.failed"]
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostLog:
      type: object
      properties:
        _id:
          type: string
        postGroupId:
          type: string
        platform:
          type: string
        platformId:
          type: string
        event:
          type: string
          description: "Log event type (e.g., scheduled, processing, published, failed)"
        message:
          type: string
        details:
          type: object
        createdAt:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        platform:
          type: string
          enum: [twitter, linkedin, instagram, threads, tiktok, youtube, facebook, bluesky, mastodon, telegram]
          example: "twitter"
        platformId:
          type: string
          example: "123456789"
        content:
          type: string
          example: "Hello from Publora API!"
        status:
          type: string
          enum: [draft, scheduled, pending, processing, published, failed]
          example: "published"
        postedId:
          type: string
          description: "Platform-specific post ID (only present if published)"
          example: "1234567890123456789"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid API key"

paths:
  /platform-connections:
    get:
      summary: List connected social accounts
      description: Returns all social media accounts connected to your Publora account.
      operationId: getPlatformConnections
      tags:
        - Connections
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      responses:
        "200":
          description: List of connected accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformConnection"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to fetch platform connections"

  /platform-limits:
    get:
      summary: Get live per-platform posting limits
      description: |
        Return Publora's per-platform limits (characters, images, videos,
        documents, GIFs, thumbnails, and requirements) as live JSON, sourced
        from the shared @publora/platform-limits package. These are the
        API-specific limits Publora validates against before scheduling — use
        them to drive client-side validation instead of hard-coding values.
        No parameters.
      operationId: getPlatformLimits
      tags:
        - Posts
      responses:
        "200":
          description: Per-platform limits
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  schemaVersion:
                    type: integer
                    example: 1
                  source:
                    type: string
                    example: "@publora/platform-limits"
                  packageVersion:
                    type: string
                    example: "1.0.0"
                  limitsLastUpdated:
                    type: string
                    example: "2026-03-11"
                  supportedPlatforms:
                    type: array
                    items:
                      type: string
                    example: ["twitter", "instagram", "threads", "tiktok", "linkedin", "youtube", "facebook", "mastodon", "bluesky", "telegram", "pinterest"]
                  platforms:
                    type: object
                    description: "Keyed by platform. Each value carries platform, displayName, characters, images, videos, requirements, plus documents, gifs, and thumbnails (null when the platform has no distinct spec)."
                    additionalProperties:
                      type: object
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /create-post:
    post:
      summary: Create and schedule a social media post
      description: |
        Create a post to be published across one or more social media platforms.
        Supports text, images, and video (1 video per post).
        The image count per post is platform-specific: Twitter/X, Bluesky, and
        Mastodon allow up to 4; Instagram, Threads, LinkedIn, Facebook, and
        Telegram allow up to 10. There is no separate "carousel" field — a
        carousel is formed implicitly by attaching multiple images to one
        postGroupId (Instagram: 2-10 images = carousel, 1 image = single photo),
        in upload order. See the Media Uploads guide for the full matrix.
        If scheduledTime is provided, the post will be published at that time.
        If omitted, the post is saved as a draft.
      operationId: createPost
      tags:
        - Posts
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, platforms]
              properties:
                content:
                  type: string
                  description: Post text content
                  example: "Excited to share our new product launch! 🚀 #launch"
                platforms:
                  type: array
                  items:
                    type: string
                  description: "Array of platform connection IDs (format: platform-platformId)"
                  example: ["twitter-123456789", "linkedin-ABC123"]
                scheduledTime:
                  type: string
                  format: date-time
                  description: "ISO 8601 UTC datetime for scheduling. Omit for draft."
                  example: "2026-03-01T14:00:00.000Z"
                platformSettings:
                  $ref: "#/components/schemas/PlatformSettingsInput"
      responses:
        "200":
          description: Post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  postGroupId:
                    type: string
                    example: "507f1f77bcf86cd799439011"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingContent:
                  value: { "error": "Content is required" }
                invalidTime:
                  value: { "error": "Invalid scheduled time" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Subscription required or free plan limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noSub:
                  value: { "error": "Subscription required" }
                freeLimit:
                  value: { "error": "Free plan limit reached" }
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /get-post/{postGroupId}:
    get:
      summary: Get post details and status
      description: Retrieve the details, platform statuses, and posted IDs for a post group.
      operationId: getPost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439011"
        - name: x-publora-user-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  postGroupId:
                    type: string
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /update-post/{postGroupId}:
    put:
      summary: Update post timing, status, or platform settings
      description: |
        Modify the scheduled time, status, or platformSettings of an existing
        draft or scheduled post.
        Cannot update posts that are published, failed, pending, or processing.
        At least one of status, scheduledTime, or platformSettings must be provided.
        platformSettings are merged per-platform with existing settings —
        omitted fields are preserved.
        Updating a post group also updates all associated platform-specific posts.
      operationId: updatePost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
        - name: x-publora-user-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "At least one of status, scheduledTime, or platformSettings must be provided"
              properties:
                status:
                  type: string
                  enum: [draft, scheduled]
                  description: "New status"
                scheduledTime:
                  type: string
                  format: date-time
                  description: "New ISO 8601 UTC scheduled time (must be in the future)"
                platformSettings:
                  $ref: "#/components/schemas/PlatformSettingsInput"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Post updated successfully"
                  postGroup:
                    type: object
                    properties:
                      _id:
                        type: string
                      status:
                        type: string
                      scheduledTime:
                        type: string
                        format: date-time
                        description: "Only included if post has a scheduled time"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value: { "error": "At least one of status, scheduledTime, or platformSettings must be provided" }
                invalidStatus:
                  value: { "error": "Status must be either 'draft' or 'scheduled'" }
                invalidTimeFormat:
                  value: { "error": "Invalid scheduled time format" }
                pastTime:
                  value: { "error": "Scheduled time cannot be in the past" }
                cannotUpdate:
                  value: { "error": "Cannot update post: post is currently in published status" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to update post"

  /delete-post/{postGroupId}:
    delete:
      summary: Delete a scheduled post
      description: |
        Delete a post group and all associated data. This operation removes:
        - The post group record
        - All platform-specific posts (Twitter, LinkedIn, Instagram, etc.)
        - All media file records from the database
        - All media files from S3 storage

        The database deletion is atomic (uses MongoDB transaction). S3 deletion
        failures are logged but do not fail the request.
      operationId: deletePost
      tags:
        - Posts
      parameters:
        - name: postGroupId
          in: path
          required: true
          schema:
            type: string
        - name: x-publora-user-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          description: Post group not found (ID doesn't exist or belongs to another user)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "500":
          description: Server error during deletion (transaction rolled back)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to delete post group"

  /get-upload-url:
    post:
      summary: Get pre-signed URL for media upload
      description: |
        Get a pre-signed S3 URL to upload images or videos.
        Upload the file directly to S3 via HTTP PUT, then create a post.
        Upload URLs expire in 1 hour. The image count per post is
        platform-specific (up to 4 for Twitter/X, Bluesky, Mastodon; up to 10
        for Instagram, Threads, LinkedIn, Facebook, Telegram), or 1 video per
        post. Attach multiple images to the same postGroupId to form a carousel.
      operationId: getUploadUrl
      tags:
        - Media
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType, type, postGroupId]
              properties:
                fileName:
                  type: string
                  example: "photo.jpg"
                contentType:
                  type: string
                  description: "MIME type (image/jpeg, image/png, video/mp4, etc.)"
                  example: "image/jpeg"
                type:
                  type: string
                  enum: [image, video]
                  example: "image"
                postGroupId:
                  type: string
                  description: "Post group to attach media to"
                  example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Upload URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  uploadUrl:
                    type: string
                    format: uri
                    description: "Pre-signed S3 URL. PUT your file here."
                  fileUrl:
                    type: string
                    format: uri
                    description: "Public URL after upload"
                  mediaId:
                    type: string
                    description: "Media record ID"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFileName:
                  value: { "error": "fileName is required" }
                missingContentType:
                  value: { "error": "contentType is required" }
                missingType:
                  value: { "error": "type is required" }
                missingPostGroupId:
                  value: { "error": "postGroupId is required" }
                invalidContentType:
                  value: { "error": "Invalid content type" }
                invalidType:
                  value: { "error": "Invalid type" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                serverError:
                  value: { "error": "Server error" }

  /upload-instagram-cover:
    post:
      summary: Upload a custom Instagram Reel cover image
      description: |
        Upload a cover image for an Instagram Reel. The image is stored as a
        JPEG (PNG/WebP are transcoded server-side; transparency is flattened
        onto white) and a public URL is returned. Set that URL as
        platformSettings.instagram.coverUrl via update-post to use it as the
        Reel cover. The target post group must be an editable (draft or
        scheduled) post you own and not currently publishing.
        Covers apply to Reels only and are ignored for Stories and images.
      operationId: uploadInstagramCover
      tags:
        - Media
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [cover, postGroupId]
              properties:
                cover:
                  type: string
                  format: binary
                  description: "Cover image (JPEG, PNG, or WebP; 8 MB max). PNG/WebP are converted to JPEG."
                postGroupId:
                  type: string
                  description: "Editable post group (draft or scheduled) to attach the cover to"
                  example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Cover uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  cover:
                    type: object
                    properties:
                      mediaId:
                        type: string
                        description: "Cover media record ID"
                        example: "665f8a1b2c3d4e5f6a7b8c9d"
                      url:
                        type: string
                        format: uri
                        description: "Public JPEG URL — set as platformSettings.instagram.coverUrl via update-post"
                        example: "https://media.publora.com/images/665f...-reel-cover.jpg"
                  message:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPostGroupId:
                  value: { "error": "postGroupId is required" }
                invalidPostGroupId:
                  value: { "error": "Invalid postGroupId" }
                missingFile:
                  value: { "error": "cover file is required" }
                badType:
                  value: { "error": "Instagram covers must be JPEG, PNG, or WebP images" }
                tooLarge:
                  value: { "error": "Instagram covers must be 8 MB or smaller" }
                tooLargeAfterTranscode:
                  value:
                    {
                      "error": "Instagram cover exceeds 8 MB after JPEG conversion; use a smaller image",
                    }
                nonEditable:
                  value: { "error": "Cannot upload Instagram cover for a non-editable post" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "409":
          description: Post group is currently publishing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group is currently being published; cannot upload Instagram cover. Retry once publishing completes."
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to upload Instagram cover"

  /upload-youtube-thumbnail:
    post:
      summary: Upload a custom YouTube video thumbnail
      description: |
        Upload a custom thumbnail for a YouTube video post. The image is stored
        as Publora-tracked media and a mediaId + url are returned; attach them
        via platformSettings.youtube.thumbnail on update-post. A thumbnail
        cannot be set on create-post — the upload requires an existing
        postGroupId (draft or scheduled) that is not currently publishing.
        JPEG or PNG, 2 MB max, minimum 640x360 px (1280x720 recommended).
      operationId: uploadYouTubeThumbnail
      tags:
        - Media
      parameters:
        - name: x-publora-user-id
          in: header
          required: false
          description: Managed user ID (workspace only)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [thumbnail, postGroupId]
              properties:
                thumbnail:
                  type: string
                  format: binary
                  description: "Thumbnail image (JPEG or PNG; 2 MB max; min 640x360 px, 1280x720 recommended)."
                postGroupId:
                  type: string
                  description: "Editable post group (draft or scheduled) to attach the thumbnail to"
                  example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Thumbnail uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  thumbnail:
                    type: object
                    properties:
                      mediaId:
                        type: string
                        description: "Thumbnail media record ID — set as platformSettings.youtube.thumbnail.mediaId via update-post"
                        example: "665f8a1b2c3d4e5f6a7b8c9d"
                      url:
                        type: string
                        format: uri
                        description: "Public thumbnail URL — set as platformSettings.youtube.thumbnail.url via update-post"
                        example: "https://media.publora.com/images/665f...-thumb.jpg"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPostGroupId:
                  value: { "error": "postGroupId is required" }
                invalidPostGroupId:
                  value: { "error": "Invalid postGroupId" }
                missingFile:
                  value: { "error": "thumbnail file is required" }
                badType:
                  value: { "error": "YouTube thumbnails must be JPEG or PNG images" }
                tooLarge:
                  value: { "error": "YouTube thumbnails must be 2 MB or smaller" }
                tooSmall:
                  value: { "error": "YouTube thumbnails must be at least 640x360 pixels" }
                nonEditable:
                  value: { "error": "Cannot upload YouTube thumbnail for a non-editable post" }
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group not found"
        "409":
          description: Post group is currently publishing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Post group is currently being published; cannot upload YouTube thumbnail. Retry once publishing completes."
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to upload YouTube thumbnail"

  /linkedin-post-statistics:
    post:
      summary: Get LinkedIn post analytics
      description: |
        Retrieve analytics for a LinkedIn post: impressions, reach, reactions, comments, reshares.
        Results are cached for 30 minutes. Use queryTypes: "ALL" to get all 5 metrics at once.
      operationId: getLinkedInPostStatistics
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postedId, platformId]
              properties:
                postedId:
                  type: string
                  description: "LinkedIn URN or share ID"
                  example: "urn:li:share:7123456789012345678"
                platformId:
                  type: string
                  description: "LinkedIn connection ID"
                  example: "linkedin-Tz9W5i6ZYG"
                queryType:
                  type: string
                  enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                  description: "Single metric to fetch"
                queryTypes:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                    - type: string
                      enum: ["ALL"]
                  description: "Multiple metrics or ALL"
                  example: "ALL"
      responses:
        "200":
          description: Statistics retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Single metric response
                    properties:
                      success:
                        type: boolean
                      count:
                        type: integer
                        example: 1542
                      cached:
                        type: boolean
                  - type: object
                    description: Multiple metrics response
                    properties:
                      success:
                        type: boolean
                      metrics:
                        type: object
                        properties:
                          IMPRESSION:
                            type: integer
                          MEMBERS_REACHED:
                            type: integer
                          RESHARE:
                            type: integer
                          REACTION:
                            type: integer
                          COMMENT:
                            type: integer
                      cached:
                        type: boolean
        "400":
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingPostedId:
                  value:
                    error: "postedId is required"
                missingPlatformId:
                  value:
                    error: "platformId is required"
                invalidQueryType:
                  value:
                    error: "Invalid queryType. Must be one of: IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT"
        "404":
          description: LinkedIn connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "LinkedIn connection not found"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Failed to fetch post statistics"

  /linkedin-account-statistics:
    post:
      summary: Get aggregated LinkedIn account analytics
      description: Get total metrics across all published LinkedIn posts for an account.
      operationId: getLinkedInAccountStatistics
      tags:
        - LinkedIn Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platformId]
              properties:
                platformId:
                  type: string
                  example: "linkedin-Tz9W5i6ZYG"
                queryType:
                  type: string
                  enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                  description: "Single metric to fetch"
                queryTypes:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        enum: [IMPRESSION, MEMBERS_REACHED, RESHARE, REACTION, COMMENT]
                    - type: string
                      enum: ["ALL"]
                  description: "Multiple metrics or ALL"
                  example: "ALL"
                aggregation:
                  type: string
                  enum: [TOTAL, DAILY]
                  default: TOTAL
                  description: "Aggregation type: TOTAL (default) or DAILY"
                dateRange:
